<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J-Claw Mission Control</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #0d1117;
  --surface:  #161b22;
  --border:   #30363d;
  --text:     #c9d1d9;
  --muted:    #484f58;
  --green:    #3fb950;
  --blue:     #58a6ff;
  --yellow:   #d29922;
  --red:      #f85149;
  --amber:    #e3b341;
  --purple:   #bc8cff;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 13px;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Header ──────────────────────────────────────────────── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.logo { font-size: 15px; font-weight: bold; color: var(--blue); letter-spacing: 2px; }

.live-wrap { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #8b949e; }
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  animation: pulse 2s ease-in-out infinite;
}
.live-dot.stale { background: var(--amber); animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

.state-badge {
  padding: 3px 10px; border-radius: 12px;
  font-size: 11px; font-weight: bold; letter-spacing: .5px;
}
.s-IDLE         { background: #21262d; color: #8b949e; }
.s-INIT         { background: #2e1b00; color: var(--amber); }
.s-SPEC_ACCEPTED{ background: #0d2449; color: var(--blue); }
.s-EXECUTING    { background: #0d2449; color: var(--blue); }
.s-DONE         { background: #0f2c0f; color: var(--green); }
.s-NEEDS_FOLLOWUP{ background: #2e1b00; color: var(--amber); }

.goal { flex: 1; color: #8b949e; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.badge {
  background: #21262d; border: 1px solid var(--border);
  border-radius: 10px; padding: 2px 8px;
  font-size: 11px; color: #8b949e;
}
.elapsed { color: #8b949e; font-size: 12px; min-width: 55px; text-align: right; }

/* ── Review Banner ───────────────────────────────────────── */
#review-banner {
  display: none; padding: 7px 18px; font-size: 12px;
  font-weight: bold; flex-shrink: 0;
}
.rv-pass  { display: flex !important; background: #0f2c0f; color: var(--green);  border-bottom: 1px solid #238636; }
.rv-fail  { display: flex !important; background: #2c0f0f; color: var(--red);    border-bottom: 1px solid var(--red); }

#openclaw-banner {
  display: none; padding: 7px 18px; font-size: 12px;
  font-weight: bold; flex-shrink: 0;
}
.oc-approved { display: flex !important; background: #1a0d33; color: var(--purple); border-bottom: 1px solid #6e40c9; }
.oc-issues   { display: flex !important; background: #2e1b00; color: var(--amber);  border-bottom: 1px solid var(--amber); }
.oc-pending  { display: flex !important; background: #21262d; color: #8b949e;       border-bottom: 1px solid var(--border); }

/* ── Main Grid ───────────────────────────────────────────── */
.main {
  display: grid;
  grid-template-columns: 340px 1fr;
  flex: 1;
  overflow: hidden;
}

/* ── Left Panel ──────────────────────────────────────────── */
.left { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.agent-section { border-bottom: 1px solid var(--border); padding: 12px 14px; flex-shrink: 0; }
.tasks-section  { flex: 1; overflow-y: auto; padding: 12px 14px; }

.panel-title {
  font-size: 10px; font-weight: bold; letter-spacing: 1px;
  color: #8b949e; text-transform: uppercase; margin-bottom: 9px;
}

.agent-box {
  border: 1px solid var(--border); border-radius: 6px;
  padding: 10px 12px; min-height: 56px;
}
.agent-box.active { border-color: var(--blue); background: #0d1b2e; }
.agent-name  { font-size: 13px; font-weight: bold; color: var(--blue); }
.agent-model { font-size: 11px; color: #8b949e; margin-top: 2px; }
.agent-timer { font-size: 22px; font-weight: bold; color: var(--text); margin-top: 6px; font-variant-numeric: tabular-nums; }

.task-count { font-size: 11px; color: #8b949e; margin-bottom: 7px; }

.task-row {
  border-left: 3px solid var(--muted);
  padding: 5px 8px; margin-bottom: 4px;
  border-radius: 0 4px 4px 0;
}
.task-row.pending    { border-left-color: var(--muted); }
.task-row.running    { border-left-color: var(--blue);  background: #0d1b2e; }
.task-row.done       { border-left-color: var(--green); }
.task-row.failed     { border-left-color: var(--red);   background: #200d0d; }
.task-row.deprecated { border-left-color: var(--muted); opacity: .45; }

.task-header { display: flex; align-items: center; gap: 4px; }
.task-id { font-size: 11px; font-weight: bold; color: #8b949e; }
.task-id.running { color: var(--blue); }
.task-id.done    { color: var(--green); }
.task-id.failed  { color: var(--red); }
.task-type { font-size: 10px; color: var(--muted); }
.retry-badge {
  background: #2e1b00; color: var(--amber);
  border-radius: 3px; padding: 1px 5px; font-size: 10px;
}
.task-obj {
  font-size: 11px; color: var(--text); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 290px;
}
.task-files { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 3px; }
.file-pill {
  background: #21262d; border-radius: 3px;
  padding: 1px 5px; font-size: 10px; color: #8b949e;
}

/* ── Right Panel ─────────────────────────────────────────── */
.right { display: grid; grid-template-rows: 1fr 1fr 1fr; overflow: hidden; }

.events-section { border-bottom: 1px solid var(--border); overflow-y: auto; padding: 12px 14px; }
.tests-section  { border-bottom: 1px solid var(--border); overflow-y: auto; padding: 12px 14px; }

.bottom-row { display: grid; grid-template-columns: 1fr 1fr 1fr; overflow: hidden; }
.errors-section  { border-right: 1px solid var(--border); overflow-y: auto; padding: 12px 14px; }
.worklog-section { border-right: 1px solid var(--border); overflow-y: auto; padding: 12px 14px; }
.files-section   { overflow-y: auto; padding: 12px 14px; }

.event-row {
  display: flex; gap: 8px; padding: 2px 0;
  border-bottom: 1px solid #1c2128; font-size: 11px;
}
.event-ts  { color: var(--muted); min-width: 56px; flex-shrink: 0; }
.event-msg { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.error-card {
  background: #200d0d; border: 1px solid #5c1d1d;
  border-radius: 4px; padding: 8px 10px; margin-bottom: 6px;
}
.error-task { color: var(--red); font-weight: bold; font-size: 11px; margin-bottom: 4px; }
.error-msg  { color: #f0a0a0; font-size: 10px; white-space: pre-wrap; word-break: break-all; }

.file-row {
  display: flex; gap: 6px; align-items: center;
  padding: 3px 0; font-size: 11px;
  border-bottom: 1px solid #1c2128;
}
.file-name { color: var(--text); overflow: hidden; text-overflow: ellipsis; flex: 1; }
.file-task { color: var(--muted); font-size: 10px; flex-shrink: 0; }

/* ── Test Results ────────────────────────────────────────── */
.test-card {
  border: 1px solid var(--border); border-radius: 5px;
  margin-bottom: 7px; overflow: hidden;
}
.test-card.pass { border-color: #238636; }
.test-card.fail { border-color: #5c1d1d; }
.test-header {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 9px; font-size: 11px;
}
.test-card.pass .test-header { background: #0f2c0f; }
.test-card.fail .test-header { background: #200d0d; }
.test-verdict { font-weight: bold; font-size: 12px; }
.test-card.pass .test-verdict { color: var(--green); }
.test-card.fail .test-verdict { color: var(--red); }
.test-method {
  padding: 1px 6px; border-radius: 3px; font-size: 10px;
  font-weight: bold; letter-spacing: .3px;
  background: #21262d; color: #8b949e;
}
.test-eco   { font-size: 10px; color: var(--muted); }
.test-task  { font-size: 10px; color: #8b949e; margin-left: auto; }
.test-ts    { font-size: 10px; color: var(--muted); }
.test-log {
  padding: 6px 9px; font-size: 10px; color: #8b949e;
  white-space: pre-wrap; word-break: break-all;
  max-height: 110px; overflow-y: auto;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
.test-line-pass { color: var(--green); }
.test-line-fail { color: var(--red); }
.test-line-info { color: #8b949e; }

/* ── Work Log ────────────────────────────────────────────── */
.wl-row {
  padding: 5px 0; border-bottom: 1px solid #1c2128;
}
.wl-header { display: flex; align-items: center; gap: 5px; margin-bottom: 2px; }
.wl-ts     { color: var(--muted); font-size: 10px; min-width: 54px; }
.wl-agent  {
  font-size: 10px; font-weight: bold; padding: 1px 6px;
  border-radius: 3px; letter-spacing: .3px;
}
.wl-agent.orchestrator { background: #1e0d33; color: var(--purple); }
.wl-agent.worker       { background: #0d1b2e; color: var(--blue);   }
.wl-model  { font-size: 10px; color: #8b949e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 110px; }
.wl-action { font-size: 10px; font-weight: bold; color: #8b949e; }
.wl-detail { font-size: 11px; color: var(--text); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.wl-status-done   { color: var(--green); }
.wl-status-pass   { color: var(--green); }
.wl-status-failed { color: var(--red); }
.wl-attempt { color: var(--amber); font-size: 10px; margin-left: 2px; }

/* ── Text selectability ──────────────────────────────────── */
.event-msg, .wl-detail, .error-msg, .test-log,
.task-obj, .file-name, .output-file-name,
.agent-name, .agent-model { user-select: text; }

/* ── Copy button ─────────────────────────────────────────── */
.copy-btn {
  background: #21262d; border: 1px solid var(--border);
  color: #8b949e; border-radius: 5px;
  padding: 4px 10px; font-size: 11px; cursor: pointer;
  font-family: inherit; transition: background .15s, color .15s;
  white-space: nowrap;
}
.copy-btn:hover { background: #30363d; color: var(--text); }
.copy-btn.copied { background: #0f2c0f; color: var(--green); border-color: #238636; }

/* ── Toast ───────────────────────────────────────────────── */
#copy-toast {
  position: fixed; bottom: 18px; right: 18px;
  background: #161b22; border: 1px solid #238636; color: var(--green);
  padding: 7px 14px; border-radius: 6px; font-size: 12px;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
  z-index: 999;
}
#copy-toast.show { opacity: 1; }

.empty { color: var(--muted); font-size: 11px; font-style: italic; padding: 4px 0; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">J-CLAW</span>
  <div class="live-wrap">
    <span class="live-dot" id="live-dot"></span>
    <span id="live-label">LIVE</span>
  </div>
  <span id="state-badge" class="state-badge s-IDLE">IDLE</span>
  <span id="goal" class="goal">Waiting for pipeline…</span>
  <span id="badge-stack" class="badge" style="display:none"></span>
  <span id="badge-complexity" class="badge" style="display:none"></span>
  <span id="elapsed" class="elapsed">0:00</span>
  <button class="copy-btn" id="copy-btn" onclick="copyLogs()" title="Copy all logs to clipboard">📋 Copy Logs</button>
</div>
<div id="copy-toast">Logs copied to clipboard</div>

<div id="review-banner"></div>
<div id="openclaw-banner"></div>

<div class="main">
  <!-- LEFT -->
  <div class="left">
    <div class="agent-section">
      <div class="panel-title">Active Agent</div>
      <div id="agent-box" class="agent-box">
        <div class="empty">No agent running</div>
      </div>
    </div>
    <div class="tasks-section">
      <div class="panel-title">Tasks</div>
      <div id="task-count" class="task-count">—</div>
      <div id="task-list"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="events-section">
      <div class="panel-title">Live Events</div>
      <div id="event-list"><div class="empty">No events yet.</div></div>
    </div>
    <div class="tests-section">
      <div class="panel-title">Test Results</div>
      <div id="test-results"><div class="empty">No tests run yet.</div></div>
    </div>
    <div class="bottom-row">
      <div class="errors-section">
        <div class="panel-title">Errors</div>
        <div id="error-list"><div class="empty">No errors.</div></div>
      </div>
      <div class="worklog-section">
        <div class="panel-title">Work Log</div>
        <div id="work-log"><div class="empty">No activity yet.</div></div>
      </div>
      <div class="files-section">
        <div class="panel-title">Output Files</div>
        <div id="file-list"><div class="empty">No files written yet.</div></div>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

let lastFetch    = Date.now();
let agentEpoch   = null;
let reviewDone   = false;
let lastState    = null;

// ── Helpers ──────────────────────────────────────────────────────────────────

function fmt(s) {
  s = Math.max(0, Math.floor(s));
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

const ICONS = { done: '✓', running: '▶', failed: '✗', pending: '○', deprecated: '–' };

// ── Render ───────────────────────────────────────────────────────────────────

function render(d) {
  const state = d.pipeline_state || 'IDLE';
  // Reset review banners when a new pipeline run starts
  if (state === 'INIT' && lastState !== 'INIT') {
    reviewDone = false;
    document.getElementById('review-banner').className = '';
    document.getElementById('review-banner').textContent = '';
    document.getElementById('openclaw-banner').className = '';
    document.getElementById('openclaw-banner').textContent = '';
  }
  lastState = state;

  // Header — state badge
  const badge = document.getElementById('state-badge');
  badge.textContent = state;
  badge.className = 'state-badge s-' + state;

  // Header — goal
  document.getElementById('goal').textContent =
    d.project?.goal || d.project?.intent || 'Waiting for pipeline…';

  // Header — stack / complexity badges
  const bStack = document.getElementById('badge-stack');
  const bComp  = document.getElementById('badge-complexity');
  if (d.project?.stack)      { bStack.textContent = d.project.stack;      bStack.style.display = ''; }
  if (d.project?.complexity) { bComp.textContent  = d.project.complexity; bComp.style.display  = ''; }

  // Header — elapsed
  document.getElementById('elapsed').textContent = fmt(d.elapsed_s || 0);

  // Review banner + OpenClaw banner (fetch once on DONE)
  if ((state === 'DONE' || state === 'NEEDS_FOLLOWUP') && d.project?.output_url && !reviewDone) {
    reviewDone = true;
    const base = '/' + d.project.output_url;

    // REVIEW.md
    fetch(base + '/REVIEW.md?t=' + Date.now())
      .then(r => r.ok ? r.text() : null)
      .then(txt => {
        if (!txt) return;
        const line = txt.split('\n').find(l => l.startsWith('VERDICT:'));
        if (!line) return;
        const pass = line.includes('PASS');
        const el = document.getElementById('review-banner');
        el.className = pass ? 'rv-pass' : 'rv-fail';
        el.textContent = (pass ? '✓' : '✗') + ' Final Review: ' + line.trim();
      })
      .catch(() => {});

    // HANDOFF.md — show OpenClaw verdict if present
    const ocBanner = document.getElementById('openclaw-banner');
    ocBanner.className = 'oc-pending';
    ocBanner.textContent = '◌ OpenClaw: awaiting handoff…';
    fetch(base + '/HANDOFF.md?t=' + Date.now())
      .then(r => r.ok ? r.text() : null)
      .then(txt => {
        if (!txt) { ocBanner.style.display = 'none'; return; }
        const verdictMatch = txt.match(/## Claude Code Verdict\n+([\s\S]+)/);
        if (verdictMatch) {
          const verdict = verdictMatch[1].trim();
          const approved = verdict.includes('OPENCLAW: APPROVED');
          ocBanner.className = approved ? 'oc-approved' : 'oc-issues';
          const lastLine = verdict.split('\n').reverse().find(l => l.trim()) || verdict;
          ocBanner.textContent = (approved ? '⬡ ' : '⚠ ') + 'OpenClaw: ' + lastLine.trim();
        } else {
          // HANDOFF.md exists but no Claude verdict yet
          const statusMatch = txt.match(/\*\*Status:\*\* (.+)/);
          const status = statusMatch ? statusMatch[1] : 'Handoff written';
          ocBanner.className = 'oc-pending';
          ocBanner.textContent = '◌ OpenClaw: ' + status;
        }
      })
      .catch(() => { ocBanner.style.display = 'none'; });
  }

  // Active agent
  const agentBox = document.getElementById('agent-box');
  if (d.active_agent) {
    agentEpoch = d.active_agent.started_epoch;
    const elapsed = Math.max(0, Date.now() / 1000 - agentEpoch);
    agentBox.className = 'agent-box active';
    agentBox.innerHTML =
      `<div class="agent-name">${esc(d.active_agent.agent)}</div>` +
      `<div class="agent-model">${esc(d.active_agent.model)} · ${esc(d.active_agent.state)}</div>` +
      `<div class="agent-timer" id="agent-timer">${fmt(elapsed)}</div>`;
  } else {
    agentEpoch = null;
    agentBox.className = 'agent-box';
    agentBox.innerHTML = '<div class="empty">No agent running</div>';
  }

  // Tasks
  const tasks = d.tasks || [];
  const doneN = tasks.filter(t => t.status === 'done').length;
  document.getElementById('task-count').textContent =
    tasks.length ? `${doneN} / ${tasks.length} completed` : '—';

  document.getElementById('task-list').innerHTML = tasks.map(t => {
    const icon  = ICONS[t.status] || '○';
    const retry = t.retry_count > 0
      ? `<span class="retry-badge">attempt ${t.retry_count}</span>` : '';
    const pills = (t.files || [])
      .map(f => `<span class="file-pill">${esc(f.split('/').pop())}</span>`)
      .join('');
    return `<div class="task-row ${t.status}">
      <div class="task-header">
        <span class="task-id ${t.status}">${icon} ${esc(t.id)}</span>
        <span class="task-type">[${esc(t.type)}]</span>
        ${retry}
      </div>
      <div class="task-obj" title="${esc(t.objective)}">${esc(t.objective)}</div>
      ${pills ? `<div class="task-files">${pills}</div>` : ''}
    </div>`;
  }).join('') || '<div class="empty">No tasks yet.</div>';

  // Events
  const events = (d.events || []).slice(0, 50);
  document.getElementById('event-list').innerHTML = events.map(e =>
    `<div class="event-row">
      <span class="event-ts">${esc(e.ts)}</span>
      <span class="event-msg" title="${esc(e.msg)}">${esc(e.msg)}</span>
    </div>`
  ).join('') || '<div class="empty">No events yet.</div>';

  // Errors
  const failed = tasks.filter(t => t.status === 'failed');
  document.getElementById('error-list').innerHTML = failed.map(t =>
    `<div class="error-card">
      <div class="error-task">✗ ${esc(t.id)} · attempt ${t.retry_count}</div>
      <div class="error-msg">${esc((t.error_log || '').slice(0, 400))}</div>
    </div>`
  ).join('') || '<div class="empty">No errors.</div>';

  // Test results
  const testResults = (d.test_results || []).slice().reverse();
  document.getElementById('test-results').innerHTML = testResults.length
    ? testResults.map(t => {
        const cls = t.passed ? 'pass' : 'fail';
        const verdict = t.passed ? '✓ PASS' : '✗ FAIL';
        const logHtml = renderTestLog(t.log || '', t.ecosystem);
        return `<div class="test-card ${cls}">
          <div class="test-header">
            <span class="test-verdict">${verdict}</span>
            <span class="test-method">${esc(t.method.toUpperCase())}</span>
            <span class="test-eco">${esc(t.ecosystem)}</span>
            <span class="test-task">${esc(t.task_id)}</span>
            <span class="test-ts">${esc(t.ts)}</span>
          </div>
          ${logHtml ? `<div class="test-log">${logHtml}</div>` : ''}
        </div>`;
      }).join('')
    : '<div class="empty">No tests run yet.</div>';

  // Work log
  const workLog = (d.work_log || []).slice().reverse(); // show newest at top
  document.getElementById('work-log').innerHTML = workLog.length
    ? workLog.slice(0, 60).map(e => {
        const isOrch = e.agent === 'orchestrator';
        const statusClass = e.status && e.status !== 'ok'
          ? ` wl-status-${e.status}` : '';
        const attempt = e.attempt ? `<span class="wl-attempt">(attempt ${e.attempt})</span>` : '';
        const modelShort = (e.model || '').split('/').pop(); // strip openrouter/ prefix
        return `<div class="wl-row">
          <div class="wl-header">
            <span class="wl-ts">${esc(e.ts)}</span>
            <span class="wl-agent ${isOrch ? 'orchestrator' : 'worker'}">${isOrch ? 'ORCH' : 'WORKER'}</span>
            <span class="wl-model" title="${esc(e.model || '')}">${esc(modelShort)}</span>
            <span class="wl-action">${esc(e.action)}</span>
            ${attempt}
          </div>
          <div class="wl-detail${statusClass}" title="${esc(e.detail)}">${esc(e.detail)}</div>
        </div>`;
      }).join('')
    : '<div class="empty">No activity yet.</div>';

  // Output files
  const files = d.output_files || [];
  document.getElementById('file-list').innerHTML = files.slice(0, 40).map(f => {
    const name = String(f.path).replace(/\\/g, '/').split('/').pop();
    return `<div class="file-row">
      <span>📄</span>
      <span class="file-name" title="${esc(f.path)}">${esc(name)}</span>
      <span class="file-task">${esc(f.task_id)}</span>
    </div>`;
  }).join('') || '<div class="empty">No files written yet.</div>';
}

// ── Copy logs to clipboard ────────────────────────────────────────────────────

let _lastData = null; // keep a reference to the latest poll result

function copyLogs() {
  if (!_lastData) { showToast('No data yet — run a pipeline first.'); return; }
  const d = _lastData;
  const lines = [];

  lines.push('=== J-CLAW PIPELINE LOG ===');
  lines.push(`State:   ${d.pipeline_state || 'IDLE'}`);
  lines.push(`Project: ${d.project?.goal || d.project?.intent || '—'}`);
  lines.push(`Stack:   ${d.project?.stack || '—'} · ${d.project?.complexity || '—'}`);
  lines.push(`Elapsed: ${fmt(d.elapsed_s || 0)}`);
  lines.push('');

  // Tasks
  const tasks = d.tasks || [];
  if (tasks.length) {
    lines.push('=== TASKS ===');
    tasks.forEach(t => {
      const retry = t.retry_count > 0 ? ` [attempt ${t.retry_count}]` : '';
      lines.push(`${(ICONS[t.status]||'○')} ${t.id} [${t.type}]${retry}: ${t.objective}`);
    });
    lines.push('');
  }

  // Test results
  if ((d.test_results || []).length) {
    lines.push('=== TEST RESULTS ===');
    d.test_results.forEach(t => {
      lines.push(`${t.passed ? 'PASS' : 'FAIL'}  [${t.method}/${t.ecosystem}] ${t.task_id}  (${t.ts})`);
      if (t.log) {
        t.log.split('\n').slice(0, 30).forEach(l => { if (l.trim()) lines.push('  ' + l); });
      }
      lines.push('');
    });
  }

  // Errors
  const failed = tasks.filter(t => t.status === 'failed');
  if (failed.length) {
    lines.push('=== ERRORS ===');
    failed.forEach(t => {
      lines.push(`${t.id} (attempt ${t.retry_count}):`);
      (t.error_log || '').split('\n').forEach(l => lines.push('  ' + l));
      lines.push('');
    });
  }

  // Work log
  if ((d.work_log || []).length) {
    lines.push('=== WORK LOG ===');
    d.work_log.forEach(e => {
      const attempt = e.attempt ? ` (attempt ${e.attempt})` : '';
      lines.push(`${e.ts}  [${e.agent}/${e.model}] ${e.action}${attempt}: ${e.detail}`);
    });
    lines.push('');
  }

  // Events
  if ((d.events || []).length) {
    lines.push('=== EVENTS ===');
    [...d.events].reverse().forEach(e => lines.push(`${e.ts}  ${e.msg}`));
  }

  const text = lines.join('\n');
  navigator.clipboard.writeText(text)
    .then(() => {
      showToast('Logs copied to clipboard ✓');
      const btn = document.getElementById('copy-btn');
      btn.classList.add('copied');
      btn.textContent = '✓ Copied';
      setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '📋 Copy Logs'; }, 2000);
    })
    .catch(() => showToast('Clipboard blocked — select text manually'));
}

function showToast(msg) {
  const el = document.getElementById('copy-toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Test log renderer ─────────────────────────────────────────────────────────
// Parses Playwright / vitest / pytest output into coloured lines.
// Falls back to plain truncated text for unknown formats.

function renderTestLog(raw, ecosystem) {
  if (!raw) return '';
  const lines = raw.split('\n');
  const out = [];

  for (const line of lines) {
    const t = line.trim();
    if (!t) continue;

    // Playwright: "  ✓  1 [chromium] › test name (1.2s)"
    if (/^\s*[✓✔]\s/.test(line) || /^\s*\d+\s+passed/.test(line)) {
      out.push(`<span class="test-line-pass">${esc(t)}</span>`);
    }
    // Playwright / vitest fail: "  ✗  1 [chromium] › test name" or "× test"
    else if (/^\s*[✗×✘✕]\s/.test(line) || /^\s*\d+\s+failed/.test(line)) {
      out.push(`<span class="test-line-fail">${esc(t)}</span>`);
    }
    // Pytest pass: "PASSED" or "passed"
    else if (/\bPASSED\b/.test(line)) {
      out.push(`<span class="test-line-pass">${esc(t)}</span>`);
    }
    // Pytest fail: "FAILED" or "ERROR"
    else if (/\b(FAILED|ERROR)\b/.test(line)) {
      out.push(`<span class="test-line-fail">${esc(t)}</span>`);
    }
    // Summary lines: "3 passed (5.2s)" / "1 failed" / "Tests: 3 passed"
    else if (/\d+\s+(passed|failed|skipped)/.test(line) || /^Tests:/.test(line)) {
      const cls = /fail/.test(line) ? 'test-line-fail' : 'test-line-pass';
      out.push(`<span class="${cls}">${esc(t)}</span>`);
    }
    // Misc info (file names, timing, runner output)
    else {
      out.push(`<span class="test-line-info">${esc(t)}</span>`);
    }

    if (out.length >= 30) { out.push('<span class="test-line-info">…</span>'); break; }
  }

  return out.join('\n');
}

// ── Live agent timer (ticks every second independently of poll) ───────────────

setInterval(() => {
  if (agentEpoch === null) return;
  const el = document.getElementById('agent-timer');
  if (el) el.textContent = fmt(Date.now() / 1000 - agentEpoch);
}, 1000);

// ── Poll loop ─────────────────────────────────────────────────────────────────

async function poll() {
  try {
    const r = await fetch('/mission_control.json?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    _lastData = data;
    lastFetch = Date.now();
    // restore live indicator
    const dot = document.getElementById('live-dot');
    dot.className = 'live-dot';
    document.getElementById('live-label').textContent = 'LIVE';
    render(data);
  } catch (_) {
    const age = Math.floor((Date.now() - lastFetch) / 1000);
    if (age > 8) {
      const dot = document.getElementById('live-dot');
      dot.className = 'live-dot stale';
      document.getElementById('live-label').textContent = `STALE ${age}s`;
    }
  }
}

poll();
setInterval(poll, 1000);
</script>
